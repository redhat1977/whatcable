name: Windows CI

on:
  push:
    branches: [main, windows-portability]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    name: Windows build (experimental)
    runs-on: windows-latest
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - uses: compnerd/gha-setup-swift@main
        with:
          branch: swift-6.0.3-release
          tag: 6.0.3-RELEASE

      - name: Build WhatCableCore
        run: swift build --target WhatCableCore

      - name: Build WhatCableWindowsBackend
        run: swift build --target WhatCableWindowsBackend

      - name: Build WhatCableWindowsCLI
        run: swift build --target WhatCableWindowsCLI

      - name: Build core tests
        run: swift build --build-tests --target WhatCableCoreTests

      - name: Run core tests
        run: swift test --skip-build --filter WhatCableCoreTests
